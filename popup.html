<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Web Agent</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; width: 360px; }
    h3 { margin: 0 0 10px 0; font-size: 15px; }
    textarea {
      width: 100%;
      height: 64px;
      margin-bottom: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 6px;
      font-size: 13px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #005fa3; }
    button:disabled { background: #aaa; cursor: default; }
    #log-container {
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 6px;
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
      background: #f9f9f9;
    }
    .log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #eee; line-height: 1.4; }
    .log-error { color: #c0392b; }
  </style>
</head>
<body>
  <h3>AI Web Agent</h3>
  <textarea id="prompt" placeholder="Describe what to do, e.g. &quot;click the Subscribe button&quot; or &quot;fill in the search box with 'hello world' and submit&quot;"></textarea>
  <button id="run">Run</button>
  <div id="log-container"></div>
  <script src="popup.js"></script>
</body>
</html>
